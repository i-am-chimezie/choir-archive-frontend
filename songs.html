<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Songs - Nigerian Catholic Choir Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .songs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 12px 20px;
            border: 1px solid var(--border);
            background: var(--card);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .songs-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .song-row {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-row:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .song-info h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .song-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .song-category {
            background: var(--bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">CHOIR<span>ARCHIVE</span></div>
            <nav>
                <a href="index.html">Home</a>
                <a href="songs.html">Songs</a>
                <a href="composers.html">Composers</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div style="max-width: 1200px; margin: 0 auto;">
            <h1>All Songs</h1>
            <p>Browse the complete collection of archived choral works</p>
        </div>
    </div>

    <div class="songs-container">
        <div class="filter-bar">
            <select id="categoryFilter" onchange="filterSongs()">
                <option value="all">All Categories</option>
                <option value="entrance">Entrance</option>
                <option value="kyrie">Kyrie</option>
                <option value="gloria">Gloria</option>
                <option value="psalm">Responsorial Psalm</option>
                <option value="offertory">Offertory</option>
                <option value="sanctus">Sanctus</option>
                <option value="agnus-dei">Agnus Dei</option>
                <option value="communion">Communion</option>
                <option value="recessional">Recessional</option>
            </select>

            <select id="languageFilter" onchange="filterSongs()">
                <option value="all">All Languages</option>
                <option value="Igbo">Igbo</option>
                <option value="English">English</option>
                <option value="Latin">Latin</option>
            </select>
        </div>

        <div class="songs-list" id="songsList">
            <!-- Populated by JS -->
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">CHOIR ARCHIVE</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="songs.html">All Songs</a>
                <a href="submit.html">Contribute</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function displayAllSongs() {
            const container = document.getElementById('songsList');
            const catFilter = document.getElementById('categoryFilter').value;
            const langFilter = document.getElementById('languageFilter').value;

            let filtered = songs;

            if (catFilter !== 'all') {
                filtered = filtered.filter(s => s.category === catFilter);
            }

            if (langFilter !== 'all') {
                filtered = filtered.filter(s => s.language.includes(langFilter));
            }

            container.innerHTML = filtered.map(song => `
                <div class="song-row" onclick="goToSong('${song.slug}')">
                    <div class="song-info">
                        <h3>${song.title}</h3>
                        <p>${song.composer} • ${song.language}</p>
                    </div>
                    <span class="song-category">${song.category}</span>
                </div>
            `).join('');
        }

        function filterSongs() {
            displayAllSongs();
        }

        function goToSong(slug) {
            window.location.href = `song.html?song=${slug}`;
        }

        document.addEventListener('DOMContentLoaded', displayAllSongs);
    </script>
</body>
</html>

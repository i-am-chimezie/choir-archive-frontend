<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Songs - Nigerian Catholic Choir Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .songs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 12px 20px;
            border: 1px solid var(--border);
            background: var(--card);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 8px;
        }

        .songs-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .song-row {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-row:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .song-info h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .song-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .song-category {
            background: var(--bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .songs-list {
                grid-template-columns: 1fr;
            }
            .page-header {
                padding: 40px 20px;
            }
            .songs-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">CHOIR<span>ARCHIVE</span></div>
            <nav>
                <a href="index.html">Home</a>
                <a href="songs.html">Songs</a>
                <a href="composers.html">Composers</a>
                <a href="about.html">About</a>
                <a href="admin.html" class="admin-link">🔐 Admin</a>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div style="max-width: 1200px; margin: 0 auto;">
            <h1>All Songs</h1>
            <p>Browse the complete collection of archived choral works</p>
        </div>
    </div>

    <div class="songs-container">
        <div class="filter-bar">
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Entrance">Entrance</option>
                <option value="Gloria">Gloria</option>
                <option value="Psalm">Psalm</option>
                <option value="Alleluia">Alleluia</option>
                <option value="Offertory">Offertory</option>
                <option value="Sanctus">Sanctus</option>
                <option value="Agnus Dei">Agnus Dei</option>
                <option value="Communion">Communion</option>
                <option value="Recessional">Recessional</option>
                <option value="Traditional Igbo">Traditional Igbo</option>
                <option value="Yoruba Hymn">Yoruba Hymn</option>
                <option value="Hausa">Hausa</option>
            </select>

            <select id="languageFilter">
                <option value="all">All Languages</option>
                <option value="English">English</option>
                <option value="Igbo">Igbo</option>
                <option value="Yoruba">Yoruba</option>
                <option value="Hausa">Hausa</option>
                <option value="Latin">Latin</option>
                <option value="Bilingual">Bilingual</option>
            </select>
        </div>

        <div class="songs-list" id="songsList">
            <div class="loading">Loading songs...</div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">CHOIR ARCHIVE</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="songs.html">All Songs</a>
                <a href="submit.html">Contribute</a>
            </div>
        </div>
    </footer>

    <script>
        const API_URL_SONGS = 'https://choir-archive-backendd.onrender.com/api';
        let allSongs = [];

        // Get category from URL (if coming from homepage)
        const urlParamsCat = new URLSearchParams(window.location.search);
        const categoryParam = urlParamsCat.get('category');
        
        // Get search query from URL (if searching)
        const searchQuery = urlParamsCat.get('search');

        async function fetchAllSongs() {
            try {
                const response = await fetch(`${API_URL_SONGS}/songs`);
                if (!response.ok) throw new Error('Failed to fetch');
                allSongs = await response.json();
                
                // Apply initial filters from URL
                if (categoryParam && categoryParam !== 'Other') {
                    document.getElementById('categoryFilter').value = categoryParam;
                }
                
                displayFilteredSongs();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('songsList').innerHTML = '<div class="no-results">❌ Failed to load songs. Please refresh the page.</div>';
            }
        }

        function displayFilteredSongs() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const languageFilter = document.getElementById('languageFilter').value;

            let filtered = [...allSongs];

            // Apply category filter
            if (categoryFilter !== 'all') {
                filtered = filtered.filter(s => s.category === categoryFilter);
            }

            // Apply language filter
            if (languageFilter !== 'all') {
                filtered = filtered.filter(s => s.language === languageFilter);
            }

            // Apply search filter (if from URL)
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(s => 
                    s.title.toLowerCase().includes(query) || 
                    s.composer.toLowerCase().includes(query) ||
                    (s.description && s.description.toLowerCase().includes(query))
                );
                
                // Update header to show search results
                const headerTitle = document.querySelector('.page-header h1');
                const headerDesc = document.querySelector('.page-header p');
                if (headerTitle && headerDesc) {
                    headerTitle.innerHTML = `Search Results: "${searchQuery}"`;
                    headerDesc.innerHTML = `Found ${filtered.length} song${filtered.length !== 1 ? 's' : ''}`;
                }
            }

            const container = document.getElementById('songsList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">No songs found. Try a different filter.</div>';
                return;
            }

            container.innerHTML = filtered.map(song => `
                <div class="song-row" onclick="goToSong('${song.slug}')">
                    <div class="song-info">
                        <h3>${escapeHtml(song.title)}</h3>
                        <p>${escapeHtml(song.composer)} • ${escapeHtml(song.language)}</p>
                    </div>
                    <span class="song-category">${escapeHtml(song.category)}</span>
                </div>
            `).join('');
        }

        function goToSong(slug) {
            window.location.href = `song.html?song=${slug}`;
        }

        function filterSongs() {
            displayFilteredSongs();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Event listeners
        document.getElementById('categoryFilter').addEventListener('change', filterSongs);
        document.getElementById('languageFilter').addEventListener('change', filterSongs);

        // Load songs
        fetchAllSongs();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song - Nigerian Catholic Choir Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .song-header {
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .song-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .song-composer {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .song-meta-bar {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .meta-item .label {
            font-weight: 600;
            color: var(--text);
        }

        .song-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .preview-section {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 4px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pdf-embed {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 4px;
        }

        .preview-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, var(--accent-light) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .preview-placeholder::before {
            content: '♫';
            font-size: 100px;
            color: var(--accent);
            opacity: 0.3;
        }

        .preview-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .details-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
        }

        .detail-item {
            margin-bottom: 25px;
        }

        .detail-item h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .detail-item p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .download-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.3s;
            margin-right: 15px;
            margin-bottom: 15px;
        }

        .download-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
        }

        .download-btn.secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .download-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: none;
        }

        .not-found {
            text-align: center;
            padding: 100px 40px;
        }

        .not-found h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 100px 40px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .song-content {
                grid-template-columns: 1fr;
                padding: 30px 20px;
            }

            .song-header {
                padding: 40px 20px;
            }

            .song-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">CHOIR<span>ARCHIVE</span></div>
            <nav>
                <a href="index.html">Home</a>
                <a href="songs.html">Songs</a>
                <a href="composers.html">Composers</a>
                <a href="about.html">About</a>
                <a href="admin.html" class="admin-link">🔐 Admin</a>
            </nav>
        </div>
    </header>

    <div id="songContainer">
        <div class="loading">Loading song...</div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">CHOIR ARCHIVE</div>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="songs.html">All Songs</a>
                <a href="submit.html">Contribute</a>
            </div>
        </div>
    </footer>

    <script>
        const API_URL_SONG = 'https://choir-archive-backendd.onrender.com/api';
        
        // Get song from URL (supports both ?song= and ?slug=)
        const urlParams = new URLSearchParams(window.location.search);
        const songSlug = urlParams.get('song') || urlParams.get('slug');

        async function getSong(slug) {
            try {
                const response = await fetch(`${API_URL_SONG}/songs/${slug}`);
                if (!response.ok) throw new Error('Song not found');
                return await response.json();
            } catch (error) {
                console.error('Error fetching song:', error);
                return null;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'Recently';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        async function displaySong() {
            const container = document.getElementById('songContainer');
            
            if (!songSlug) {
                container.innerHTML = `
                    <div class="not-found">
                        <h2>Song Not Found</h2>
                        <p>No song specified. Please select a song from the <a href="index.html" style="color: var(--accent);">homepage</a>.</p>
                    </div>
                `;
                return;
            }

            const song = await getSong(songSlug);

            if (!song) {
                container.innerHTML = `
                    <div class="not-found">
                        <h2>Song Not Found</h2>
                        <p>The song you're looking for doesn't exist. Go back to <a href="index.html" style="color: var(--accent);">homepage</a>.</p>
                    </div>
                `;
                return;
            }

            // Update page title
            document.title = `${song.title} - Nigerian Catholic Choir Archive`;

            container.innerHTML = `
                <div class="song-header">
                    <div style="max-width: 1200px; margin: 0 auto;">
                        <a href="songs.html?category=${encodeURIComponent(song.category)}" class="back-link">← Back to ${song.category}</a>
                        <h1 class="song-title">${escapeHtml(song.title)}</h1>
                        <p class="song-composer">${escapeHtml(song.composer || 'Unknown Composer')}</p>
                        <div class="song-meta-bar">
                            <div class="meta-item">
                                <span class="label">Category:</span>
                                <span>${escapeHtml(song.category || 'General')}</span>
                            </div>
                            <div class="meta-item">
                                <span class="label">Language:</span>
                                <span>${escapeHtml(song.language || 'Not specified')}</span>
                            </div>
                            <div class="meta-item">
                                <span class="label">Added:</span>
                                <span>${formatDate(song.date_added)}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="song-content">
                    <div class="preview-section">
                        ${song.pdf_url ? `
                            <iframe src="${song.pdf_url}" class="pdf-embed" title="${escapeHtml(song.title)} PDF"></iframe>
                            <p class="preview-text" style="margin-top: 15px;">
                                <a href="${song.pdf_url}" target="_blank" style="color: var(--accent);">📄 Open PDF in new tab</a>
                            </p>
                        ` : `
                            <div class="preview-placeholder"></div>
                            <p class="preview-text">Sheet music preview will appear here once uploaded</p>
                        `}
                    </div>

                    <div class="details-section">
                        <h2>Song Details</h2>
                        
                        <div class="detail-item">
                            <h4>Description</h4>
                            <p>${escapeHtml(song.description) || 'No description available.'}</p>
                        </div>

                        <div class="detail-item">
                            <h4>When to Sing</h4>
                            <p>${escapeHtml(song.when_to_sing) || 'Appropriate for this part of the Mass.'}</p>
                        </div>

                        <div class="detail-item">
                            <h4>Composer</h4>
                            <p>${escapeHtml(song.composer || 'Unknown')}</p>
                        </div>

                        <div class="download-section">
                            <h2>Download</h2>
                            ${song.pdf_url ? `
                                <a href="${song.pdf_url}" class="download-btn" target="_blank">
                                    <span>📄</span> Download PDF
                                </a>
                            ` : ''}
                            ${song.audio_url ? `
                                <a href="${song.audio_url}" class="download-btn secondary" target="_blank">
                                    <span>🎵</span> Download Audio
                                </a>
                            ` : ''}
                            ${!song.pdf_url && !song.audio_url ? '<p>No downloadable files available yet.</p>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.addEventListener('DOMContentLoaded', displaySong);
    </script>
</body>
</html>
